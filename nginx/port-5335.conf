# Port 5335 is shared by three independent solutions on this host:
#   - Open WebUI (Ollama's chat UI), moved to an internal-only port so this
#     proxy can own 5335 - served at the root path.
#   - The custom-query PDF UI (webui/, this repo), served under /customquery.
#   - A static ops report (tools/generate_ops_report.py, regenerated
#     every 24h by cron), served under /report.
server {
    listen 5335;
    server_name _;

    client_max_body_size 20m;

    location /report/ {
        alias /usr/share/nginx/ops-report/;
        index index.html;
    }

    location = /report {
        return 301 /report/;
    }

    location /customquery/ {
        proxy_pass http://127.0.0.1:8090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /customquery;
    }

    # Bare /customquery (no trailing slash) -> redirect so relative
    # links/forms inside the app resolve correctly.
    location = /customquery {
        return 301 /customquery/;
    }

    location / {
        proxy_pass http://127.0.0.1:5336;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Open WebUI uses WebSockets for streaming responses.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}
