x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment:
    &airflow-common-env
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__CORE__FERNET_KEY: 'xkDkjAkSjCgmL2jQbxReSFWdbjH2egYneaxhSa38JGs='
    AIRFLOW__WEBSERVER__SECRET_KEY: 'local-dev-secret-change-for-production'
    AIRFLOW__API_AUTH__JWT_SECRET: 'nbxHYZ5XxyuYpbYdANnvsnL6QymJUs4_bA74w64kfWU='
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-webserver:8080/execution/'
    PYTHONPATH: /opt/airflow/dags

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    environment:
      <<: *airflow-common-env
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    command: bash -c "airflow db migrate && (airflow users create --username admin --password admin --firstname Admin --lastname Admin --role Admin --email admin@example.com || true)"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: api-server
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 10s
      timeout: 10s
      retries: 10

  airflow-dag-processor:
    <<: *airflow-common
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    command: dag-processor
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  webui:
    build:
      context: .
      dockerfile: webui/Dockerfile
    volumes:
      - ./dags:/app/dags:ro
    ports:
      - "8090:5000"
    restart: unless-stopped

  nginx-5335:
    image: nginx:alpine
    network_mode: host
    volumes:
      - ./nginx/port-5335.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - webui
    restart: unless-stopped

volumes:
  postgres_data:
  airflow_logs:
